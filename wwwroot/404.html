<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>
  <script>
    // Redirect all unknown routes back to the SPA entry point
    // Preserve the path so the client router can handle it
    var base = "/DeathwatchMobile/";
    var path = location.pathname;

    // If we're already under the repo base, strip it to store for later
    if (path.startsWith(base)) {
      path = path.substring(base.length - 1);
    }

    // Store the original path + query so index.html can restore it
    sessionStorage.redirect = location.pathname + location.search + location.hash;

    location.replace(base);
  </script>
</head>
<body></body>
</html>
